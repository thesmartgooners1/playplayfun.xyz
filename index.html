<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Match Player</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-3">
    <h3 id="matchTitle">Loading match...</h3>
    <video id="livePlayer" controls autoplay style="width:100%; max-width:800px;">
        Your browser does not support the video tag.
    </video>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const matchId = urlParams.get('matchId');

// Fetch match info from your API to get the stream link
async function loadStream() {
    try {
        const response = await fetch(`YOUR_API_ENDPOINT_HERE?matchId=${matchId}`);
        const data = await response.json();

        document.getElementById('matchTitle').textContent = `${data.homeTeam.name} vs ${data.awayTeam.name}`;
        document.getElementById('livePlayer').src = data.streamUrl; // Your live stream URL
    } catch (error) {
        console.error("Failed to load stream:", error);
    }
}

loadStream();
</script>
</body>
</html>
