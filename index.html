<body class="pt-5 d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top topbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="https://i.ibb.co/9mCsbmPZ/IMG-20251108-234822.png" alt="" width="115"
                    height="40" class="d-inline-block align-text-top icon">
            </a>
            <a href="/app">
                <div class="getapp">
                    <h4 class="clicktext">HKTV အက်ပ်ရယူရန်</h4>
                </div>
            </a>
        </div>
    </nav>

    <main class="flex-grow-1" style="padding-left: 10px; padding-right:10px;">
        <div class="container my-3 match-bg">
            <div class="row" id="matches-container">
                <!-- Live matches will be inserted here -->
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-3 mt-5">
        <div class="container text-center">
            <p class="mb-0">
                &copy; <span id="currentYear"></span> HK TV. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Function to load live matches
        async function loadLiveMatches() {
            try {
                const response = await fetch("YOUR_API_ENDPOINT_HERE"); // <-- Replace with your API
                const data = await response.json();

                const container = document.getElementById("matches-container");
                container.innerHTML = ""; // Clear previous matches

                data.matches.forEach(match => {
                    const matchCard = `
                    <div class="col-12 col-lg-4 mb-1">
                        <a href="${match.link}">
                            <div class="match-container">
                                <div class="match-title">
                                    <img src="${match.leagueLogo}" alt="" class="league-image">
                                    <span class="text">${match.leagueName}</span>
                                </div>
                                <div class="match-body">
                                    <div class="club-bg">
                                        <img src="${match.homeTeam.logo}" alt="" class="club-image">
                                    </div>
                                    <div class="date-time">
                                        <span class="text-time">${match.time}</span>
                                        <span class="text-date">${match.date}</span>
                                    </div>
                                    <div class="club-bg">
                                        <img src="${match.awayTeam.logo}" alt="" class="club-image">
                                    </div>
                                </div>
                                <div class="match-foot">
                                    <div class="club-bg"><span class="team">${match.homeTeam.name}</span></div>
                                    <div class="club-bg"><span class="team">${match.awayTeam.name}</span></div>
                                </div>
                            </div>
                        </a>
                    </div>
                    `;
                    container.insertAdjacentHTML("beforeend", matchCard);
                });
            } catch (error) {
                console.error("Error loading live matches:", error);
            }
        }

        // Initial load
        loadLiveMatches();

        // Refresh every 30 seconds for live updates
        setInterval(loadLiveMatches, 30000);
    </script>
</body>

</html>
